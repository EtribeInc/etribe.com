    border: 1px solid var(--color-border);

    background: var(--color-surface);
    color: var(--color-text);

    color: var(--color-text);
    -webkit-appearance: none;

/* =====================================================================
   LON/LAT → HORIZONTAL PLANE MAPPING (y = 0)
   
   We use a simple equirectangular approximation mapped onto the
   XZ ground plane so the data appears flat/horizontal when viewed
   from above:
     x = (lon - meanLon) * cos(meanLat) * scale   (East–West)
     z = -(lat - meanLat) * scale                  (North–South, negated so
                                                     north points toward -Z,
                                                     matching a top-down map view)
     y = 0                                          (up axis, always zero)
   
   In Three.js the Y axis is "up", so placing data in the XZ plane
   makes it lie flat like a map on a table. The camera looks down
   from above.
   
   The COORD_SCALE factor converts degree offsets into scene units
   so the data cloud fills a reasonable viewport.
   ===================================================================== */
function projectToPlane(lon, lat, meanLon, meanLat) {
  const cosLat = Math.cos(meanLat * Math.PI / 180);
  const x = (lon - meanLon) * cosLat * COORD_SCALE;
  const y = 0;  // up axis — always zero for surface tracks
  const z = -(lat - meanLat) * COORD_SCALE; // negate so north = -Z (map convention)
  return { x, y, z };
}

  return new Promise((resolve, reject) => {
    Papa.parse(text, {
      header: true,
      skipEmptyLines: true,
      dynamicTyping: false,

        const dateCol = fieldMap['date'];
        const lonCol = fieldMap['lon'];
        const latCol = fieldMap['lat'];

        if (!dateCol) missing.push('date');
        if (!lonCol) missing.push('lon');
        if (!latCol) missing.push('lat');

        if (missing.length > 0) {
          reject(new Error('Missing required column(s): ' + missing.join(', ') +
            '. Found: ' + fields.join(', ')));
          return;
        }

        const samples = [];
        for (const row of results.data) {
          const id = String(row[idCol]).trim();
          const dateStr = String(row[dateCol]).trim();
          const lon = parseFloat(row[lonCol]);
          const lat = parseFloat(row[latCol]);

          if (!id || isNaN(lon) || isNaN(lat)) continue;

          const timestamp = new Date(dateStr).getTime();
          if (isNaN(timestamp)) continue;

          samples.push({ id, timestamp, lon, lat, dateStr });
        }

        if (samples.length === 0) {
          reject(new Error('No valid data rows found. Check that lon/lat are numeric and date is a valid timestamp.'));
          return;
        }

        resolve(samples);
      },
      error: (err) => {
        reject(new Error('CSV parsing error: ' + err.message));
      }
    });
  });
}

/* =====================================================================
   TRACK CREATION
   
   For each unique animal ID:
   1. Sort samples by date (ascending).
   2. Compute a line strip geometry connecting all points in time order.
   3. Create a small sphere (InstancedMesh for performance) at each
      sample position.
   4. Assign a distinct color from the palette.
   
   All geometry lives in a THREE.Group per track so we can show/hide
   individual tracks via the filter dropdown.
   ===================================================================== */
function buildTracks(samples) {
  // Clear existing tracks
  for (const id of Object.keys(trackGroups)) {
    scene.remove(trackGroups[id].group);
    // Dispose geometry/materials
    trackGroups[id].group.traverse(child => {
      if (child.geometry) child.geometry.dispose();
      if (child.material) {
        if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
        else child.material.dispose();
      }
    });
  }
  trackGroups = {};

  // Compute centroid for projection
  let sumLon = 0, sumLat = 0;
  for (const s of samples) { sumLon += s.lon; sumLat += s.lat; }
  const meanLon = sumLon / samples.length;
  const meanLat = sumLat / samples.length;

  // Project all samples and store 3D positions
  for (const s of samples) {
    const p = projectToPlane(s.lon, s.lat, meanLon, meanLat);
    s.px = p.x;
    s.py = p.y;
    s.pz = p.z;
  }

  // Group by ID
  const byId = {};
  for (const s of samples) {
    if (!byId[s.id]) byId[s.id] = [];
    byId[s.id].push(s);
  }

  // Sort each group by timestamp
  for (const id of Object.keys(byId)) {
    byId[id].sort((a, b) => a.timestamp - b.timestamp);
  }

  // Compute global time range
  globalMinTime = Infinity;
  globalMaxTime = -Infinity;
  for (const s of samples) {
    if (s.timestamp < globalMinTime) globalMinTime = s.timestamp;
    if (s.timestamp > globalMaxTime) globalMaxTime = s.timestamp;
  }
  currentTime = globalMaxTime;

  // Compute data extent for scaling point size
  // (use px and pz since data now lives on the XZ plane)
  let minPx = Infinity, maxPx = -Infinity;
  let minPz = Infinity, maxPz = -Infinity;
  for (const s of samples) {
    if (s.px < minPx) minPx = s.px;
    if (s.px > maxPx) maxPx = s.px;
    if (s.pz < minPz) minPz = s.pz;
    if (s.pz > maxPz) maxPz = s.pz;
  }
  const dataExtent = Math.max(maxPx - minPx, maxPz - minPz, 1);
  const pointRadius = dataExtent * POINT_SIZE_FRACTION;

  // Build 3D objects for each track
  const ids = Object.keys(byId);
  const sphereGeom = new THREE.SphereGeometry(pointRadius, 8, 6);

  for (let i = 0; i < ids.length; i++) {
    const id = ids[i];
    const pts = byId[id];
    const colorHex = TRACK_COLORS[i % TRACK_COLORS.length];
    const color = new THREE.Color(colorHex);

    const group = new THREE.Group();
    group.name = 'track_' + id;

    // --- Line strip ---
    // We create the full line geometry but will dynamically update
    // drawRange to show only segments up to the current time.
    const linePositions = new Float32Array(pts.length * 3);
    for (let j = 0; j < pts.length; j++) {
      linePositions[j * 3]     = pts[j].px;
      linePositions[j * 3 + 1] = pts[j].py;
      linePositions[j * 3 + 2] = pts[j].pz;
    }
    const lineGeom = new THREE.BufferGeometry();
    lineGeom.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
    const lineMat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.7 });
    const lineObj = new THREE.Line(lineGeom, lineMat);
    group.add(lineObj);

    // --- Point markers (InstancedMesh for performance) ---
    const pointMat = new THREE.MeshLambertMaterial({ color, transparent: true, opacity: 0.9 });
    const instMesh = new THREE.InstancedMesh(sphereGeom, pointMat, pts.length);
    const dummy = new THREE.Object3D();
    for (let j = 0; j < pts.length; j++) {
      dummy.position.set(pts[j].px, pts[j].py, pts[j].pz);
      dummy.updateMatrix();
      instMesh.setMatrixAt(j, dummy.matrix);
    }
    instMesh.instanceMatrix.needsUpdate = true;
    // Store track id on the mesh for raycasting identification
    instMesh.userData.trackId = id;
    group.add(instMesh);

    scene.add(group);

    trackGroups[id] = {
      group,
      points: pts,
      lineObj,
      instMesh,
      color: colorHex
    };
  }

  // Build coastline overlay using the same projection
  buildCoastline(meanLon, meanLat);

  // Auto-frame the camera to fit all data
  fitCameraToData(samples);

  // Populate filter dropdown
  populateFilter(ids);
}

/* =====================================================================
   COASTLINE RENDERING
   
   Projects the embedded coastline lon/lat data through the same
   equirectangular projection used for the tracking data, so the
   coastline aligns exactly with the animal tracks. Draws white
   semi-transparent lines on the XZ ground plane (y = 0).
   ===================================================================== */
function buildCoastline(meanLon, meanLat) {
  // Remove previous coastline if reloading data
  if (coastlineGroup) {
    coastlineGroup.traverse(child => {
      if (child.geometry) child.geometry.dispose();
      if (child.material) child.material.dispose();
    });
    scene.remove(coastlineGroup);
  }

  coastlineGroup = new THREE.Group();
  coastlineGroup.name = 'coastline';

  const coastMat = new THREE.LineBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0.35
  });

  const cosLat = Math.cos(meanLat * Math.PI / 180);

  for (const segment of COASTLINE_SEGMENTS) {
    if (segment.length < 2) continue;

    const positions = new Float32Array(segment.length * 3);
    for (let i = 0; i < segment.length; i++) {
      const lon = segment[i][0];
      const lat = segment[i][1];
      // Same projection as projectToPlane()
      positions[i * 3]     = (lon - meanLon) * cosLat * COORD_SCALE;  // x
      positions[i * 3 + 1] = 0;                                       // y (up)
      positions[i * 3 + 2] = -(lat - meanLat) * COORD_SCALE;          // z
    }

    const geom = new THREE.BufferGeometry();
    geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const line = new THREE.Line(geom, coastMat);
    coastlineGroup.add(line);
  }

  scene.add(coastlineGroup);
}

/* =====================================================================
   CAMERA FRAMING
   
   Position the camera above and slightly angled over the data centroid.
   Data lives on the XZ ground plane (y = 0). The camera looks down
   from above. Distance is computed from the FOV so the entire dataset
   fits within the viewport with a 15% margin.
   ===================================================================== */
function fitCameraToData(samples) {
  let minX = Infinity, maxX = -Infinity;
  let minZ = Infinity, maxZ = -Infinity;
  for (const s of samples) {
    if (s.px < minX) minX = s.px;
    if (s.px > maxX) maxX = s.px;
    if (s.pz < minZ) minZ = s.pz;
    if (s.pz > maxZ) maxZ = s.pz;
  }
  const cx = (minX + maxX) / 2;
  const cz = (minZ + maxZ) / 2;
  const extentX = maxX - minX;
  const extentZ = maxZ - minZ;
  const extent = Math.max(extentX, extentZ, 1);

  // Compute camera height so the full extent fits in view.
  // The camera looks mostly straight down with a slight tilt.
  // Use the vertical FOV to compute the required distance, then
  // add a 35% margin so nothing clips behind the UI panels
  // (controls panel top-left, time slider bottom).
  const margin = 1.5;
  const fovRad = camera.fov * Math.PI / 180;
  const aspect = camera.aspect;
  // The limiting axis: if data is wider than tall (in screen terms),
  // the horizontal FOV is the constraint; otherwise vertical.
  const hFov = 2 * Math.atan(Math.tan(fovRad / 2) * aspect);
  const requiredDistV = (extent * margin / 2) / Math.tan(fovRad / 2);
  const requiredDistH = (extent * margin / 2) / Math.tan(hFov / 2);
  const dist = Math.max(requiredDistV, requiredDistH);

  // Place the orbit target at the data centroid on the ground plane
  controls.target.set(cx, 0, cz);

  // Camera above and slightly offset for a gentle angle.
  // The Z offset tilts the view slightly, so we shift the target
  // forward (toward -Z in screen) to compensate for the tilt
  // pushing the bottom of the data down.
  const tiltOffset = dist * 0.15;
  camera.position.set(cx, dist * 0.97, cz + tiltOffset);
  camera.lookAt(cx, 0, cz);
  controls.update();

  // Save as initial state for reset
  initialCameraPos.copy(camera.position);
  initialTarget.copy(controls.target);
}

/* =====================================================================
   TIME-BASED VISIBILITY
   
   For each track, we use binary search to find how many points fall
   at or before currentTime. We then:
     - Set lineObj.geometry.drawRange to show only those segments
     - Set instMesh.count to show only those point markers
   
   This avoids rebuilding geometry on every frame.
   ===================================================================== */
function updateVisibility() {
  for (const id of Object.keys(trackGroups)) {
    const tg = trackGroups[id];
    const pts = tg.points;

    // If group is hidden (filter), skip
    if (!tg.group.visible) continue;

    // Binary search for the count of points with timestamp <= currentTime
    let lo = 0, hi = pts.length;
    while (lo < hi) {
      const mid = (lo + hi) >>> 1;
      if (pts[mid].timestamp <= currentTime) lo = mid + 1;
      else hi = mid;
    }
    const count = lo; // number of visible points

    // Update line draw range (count vertices = count, but line needs at least 2)
    tg.lineObj.geometry.setDrawRange(0, count);

    // Update instanced mesh visible count
    tg.instMesh.count = count;
  }
}

/* =====================================================================
   FILTER DROPDOWN
   ===================================================================== */
function populateFilter(ids) {
  const sel = document.getElementById('id-filter');
  // Keep the "All tracks" option, remove old entries
  while (sel.options.length > 1) sel.remove(1);

  for (const id of ids) {
    const opt = document.createElement('option');
    opt.value = id;
    const tg = trackGroups[id];
    opt.textContent = id + ' (' + tg.points.length + ' pts)';
    opt.style.color = tg.color;
    sel.appendChild(opt);
  }
}

function applyFilter(selectedId) {
  for (const id of Object.keys(trackGroups)) {
    trackGroups[id].group.visible = (selectedId === '__all__' || selectedId === id);
  }
}

/* =====================================================================
   TIME SLIDER UI
   ===================================================================== */
function updateTimeSliderUI() {
  const slider = document.getElementById('time-slider');
  const label = document.getElementById('time-label');

  if (globalMaxTime <= globalMinTime) {
    label.textContent = '—';
    return;
  }

  // Map currentTime to slider position
  const frac = (currentTime - globalMinTime) / (globalMaxTime - globalMinTime);
  slider.value = Math.round(frac * 1000);

  // Format date nicely
  const d = new Date(currentTime);
  label.textContent = d.toISOString().replace('T', ' ').replace(/\.\d+Z$/, ' UTC');
}

function onSliderInput() {
  const slider = document.getElementById('time-slider');
  const frac = parseFloat(slider.value) / 1000;
  currentTime = globalMinTime + frac * (globalMaxTime - globalMinTime);
  updateTimeSliderUI();
  updateVisibility();
}

function togglePlayback() {
  isPlaying = !isPlaying;
  const btn = document.getElementById('btn-play');
  btn.innerHTML = isPlaying ? '&#10074;&#10074; Pause' : '&#9654; Play';
  if (isPlaying) {
    lastFrameTime = performance.now();
    // If at max, restart from beginning
    if (currentTime >= globalMaxTime) {
      currentTime = globalMinTime;
      updateTimeSliderUI();
      updateVisibility();
    }
  } else {
    lastFrameTime = 0;
  }
}

/* =====================================================================
   DOUBLE-CLICK / DOUBLE-TAP TO RE-CENTER
   
   On double-click (or double-tap on touch), cast a ray from the
   cursor into the scene. If it hits a point marker, move the orbit
   target to that 3D position so the user can zoom into that area.
   ===================================================================== */
function onDoubleClick(event) {
  // Compute normalized device coordinates
  const rect = renderer.domElement.getBoundingClientRect();
  let clientX, clientY;

  if (event.touches) {
    // Touch event
    clientX = event.touches[0] ? event.touches[0].clientX : event.changedTouches[0].clientX;
    clientY = event.touches[0] ? event.touches[0].clientY : event.changedTouches[0].clientY;
  } else {
    clientX = event.clientX;
    clientY = event.clientY;
  }

  mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  // Collect all instanced meshes for intersection test
  const meshes = [];
  for (const id of Object.keys(trackGroups)) {
    if (trackGroups[id].group.visible) {
      meshes.push(trackGroups[id].instMesh);
    }
  }

  const hits = raycaster.intersectObjects(meshes, false);

  if (hits.length > 0) {
    const hit = hits[0];
    const point = hit.point;
    // Smoothly move orbit target to hit point
    animateOrbitTarget(point.x, point.y, point.z);
  }
}

function animateOrbitTarget(tx, ty, tz) {
  const startTarget = controls.target.clone();
  const endTarget = new THREE.Vector3(tx, ty, tz);
  const startTime = performance.now();
  const duration = 400; // ms

  function step() {
    const elapsed = performance.now() - startTime;
    const t = Math.min(elapsed / duration, 1);
    // Ease out cubic
    const ease = 1 - Math.pow(1 - t, 3);
    controls.target.lerpVectors(startTarget, endTarget, ease);
    controls.update();
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// Double-tap detection for touch devices
let lastTapTime = 0;
function onTouchEnd(event) {
  const now = Date.now();
  if (now - lastTapTime < 350) {
    // Double tap detected
    event.preventDefault();
    onDoubleClick(event);
  }
  lastTapTime = now;
}

/* =====================================================================
   ERROR / STATUS DISPLAY
   ===================================================================== */
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('status-msg').style.display = 'none';
}

function showStatus(msg) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('error-msg').style.display = 'none';
}

function clearMessages() {
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('status-msg').style.display = 'none';
}

/* =====================================================================
   FILE LOADING
   ===================================================================== */
async function loadFile() {
  clearMessages();
  const fileInput = document.getElementById('file-input');
  if (!fileInput.files || fileInput.files.length === 0) {
    showError('Please select a CSV file first.');
    return;
  }

  const file = fileInput.files[0];
  showStatus('Reading ' + file.name + '...');

  try {
    const text = await file.text();
    showStatus('Parsing CSV...');
    const samples = await parseCSV(text);
    allSamples = samples;

    showStatus('Building ' + samples.length + ' points across ' +
      new Set(samples.map(s => s.id)).size + ' tracks...');

    buildTracks(samples);

    // Show time panel
    document.getElementById('time-panel').style.display = 'flex';
    // Initialize slider to max (show all)
    currentTime = globalMaxTime;
    updateTimeSliderUI();
    updateVisibility();

    // Stop any playback
    isPlaying = false;
    document.getElementById('btn-play').innerHTML = '&#9654; Play';
    lastFrameTime = 0;

    const trackCount = Object.keys(trackGroups).length;
    showStatus('Loaded ' + samples.length + ' points, ' + trackCount + ' tracks.');

  } catch (err) {
    showError(err.message);
  }
}

/* =====================================================================
   RESET CAMERA
   ===================================================================== */
function resetCamera() {
  if (allSamples.length > 0) {
    fitCameraToData(allSamples);
  } else {
    camera.position.copy(initialCameraPos);
    controls.target.copy(initialTarget);
    controls.update();
  }
}

/* =====================================================================
   EVENT BINDINGS
   ===================================================================== */
function bindEvents() {
  document.getElementById('btn-load').addEventListener('click', loadFile);
  document.getElementById('btn-reset').addEventListener('click', resetCamera);
  document.getElementById('id-filter').addEventListener('change', (e) => {
    applyFilter(e.target.value);
  });

  // Time controls
  document.getElementById('time-slider').addEventListener('input', onSliderInput);
  document.getElementById('btn-play').addEventListener('click', togglePlayback);

  // Speed slider
  const speedSlider = document.getElementById('speed-slider');
  const speedValue = document.getElementById('speed-value');
  speedSlider.addEventListener('input', () => {
    playbackSpeed = parseFloat(speedSlider.value);
    speedValue.textContent = playbackSpeed + 'x';
  });

  // Double-click to re-center
  renderer.domElement.addEventListener('dblclick', onDoubleClick);

  // Double-tap for touch (iPad)
  renderer.domElement.addEventListener('touchend', onTouchEnd, { passive: false });

  // Prevent iOS Safari from intercepting multi-touch gestures on the canvas.
  // This is critical for pinch-zoom to work via OrbitControls instead of
  // triggering the browser's page zoom.
  renderer.domElement.addEventListener('gesturestart', (e) => e.preventDefault(), { passive: false });
  renderer.domElement.addEventListener('gesturechange', (e) => e.preventDefault(), { passive: false });
  renderer.domElement.addEventListener('gestureend', (e) => e.preventDefault(), { passive: false });
}

/* =====================================================================
   INIT
   ===================================================================== */
initScene();
bindEvents();

</script>
<script data-pplx-inline-edit>
(function(){
  if(window===window.top)return;
  function inlineAll(orig,clone){
    if(orig.nodeType!==1)return;
    try{
      var cs=getComputedStyle(orig);
      var t='';
      for(var i=0;i<cs.length;i++){t+=cs[i]+':'+cs.getPropertyValue(cs[i])+';';}
      clone.style.cssText=t;
    }catch(e){}
    var oc=orig.children,cc=clone.children;
    for(var j=0;j<oc.length&&j<cc.length;j++){inlineAll(oc[j],cc[j]);}
  }
  function stripExternal(clone){
    var imgs=clone.querySelectorAll('img');
    for(var i=0;i<imgs.length;i++){
      var s=imgs[i].getAttribute('src');
      if(s&&!s.startsWith('data:'))imgs[i].removeAttribute('src');
    }
    var all=clone.querySelectorAll('*');
    for(var i=0;i<all.length;i++){
      var st=all[i].style.cssText;
      if(st&&st.indexOf('url(')>=0){
        all[i].style.cssText=st.replace(/url\(["']?(?!data:)[^)"']*["']?\)/gi,'none');
      }
    }
  }
  window.addEventListener('message',function(e){
    if(!e.data||e.data.type!=='INLINE_EDIT_CAPTURE_REQUEST')return;
    var scrollX=window.scrollX||window.pageXOffset||0;
    var scrollY=window.scrollY||window.pageYOffset||0;
    var w=window.innerWidth,h=window.innerHeight;
    try{
      var clone=document.documentElement.cloneNode(true);
      var rm=clone.querySelectorAll('script,link[rel="stylesheet"],style');
      for(var i=0;i<rm.length;i++){rm[i].remove();}
      inlineAll(document.documentElement,clone);
      stripExternal(clone);
      var html=new XMLSerializer().serializeToString(clone);
      var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'">'
        +'<foreignObject width="100%" height="100%">'
        +'<div xmlns="http://www.w3.org/1999/xhtml" style="width:'+w+'px;height:'+h+'px;overflow:hidden">'
        +'<div style="transform:translate(-'+scrollX+'px,-'+scrollY+'px);transform-origin:top left">'
        +html+'</div></div></foreignObject></svg>';
      var svgUrl='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
      var img=new Image();
      img.onload=function(){
        var c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0);
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:c.toDataURL('image/png'),scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.onerror=function(){
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.src=svgUrl;
    }catch(err){
      window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
    }
  });
})();
