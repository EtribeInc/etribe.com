<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #0f0f0f;
      --card: #1a1a1a;
      --border: #2a2a2a;
      --text: #e0e0e0;
      --muted: #666;
      --sleep: #4fc3f7;
      --dizziness: #ef9a9a;
      --alertness: #a5d6a7;
      --sex: #ce93d8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      padding: 2rem 1rem;
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
    }
    .datetime {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 1.25rem;
    }
    .form-group label {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .form-group select {
      width: 100%;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
    }
    .btn-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    button {
      padding: 0.5rem 1.25rem;
      border-radius: 4px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-primary { background: #4fc3f7; color: #000; }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-danger { background: #ef9a9a; color: #000; }
    .graph-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 2rem;
      box-shadow: 0 0 20px rgba(79,195,247,0.05);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
    }
    th {
      text-align: left;
      color: var(--muted);
      padding: 0.5rem;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    td { padding: 0.5rem; border-bottom: 1px solid #1f1f1f; }
    tr:last-child td { border-bottom: none; }
    .status { font-size: 0.75rem; color: var(--muted); margin-top: 0.5rem; }
  </style>
</head>
<body>

  <h1>Daily Tracker</h1>
  <div class="datetime" id="clock"></div>

  <div class="card">
    <div class="form-grid">
      <div class="form-group">
        <label style="color: var(--sleep)">Sleep Quality</label>
        <select id="sleep"><option value="">—</option></select>
      </div>
      <div class="form-group">
        <label style="color: var(--dizziness)">Dizziness</label>
        <select id="dizziness"><option value="">—</option></select>
      </div>
      <div class="form-group">
        <label style="color: var(--alertness)">Alertness</label>
        <select id="alertness"><option value="">—</option></select>
      </div>
      <div class="form-group">
        <label style="color: var(--sex)">Sex</label>
        <select id="sex"><option value="">—</option></select>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="submitEntry()">Submit</button>
      <button class="btn-secondary" onclick="exportCsv()">Export CSV</button>
      <button class="btn-danger" onclick="clearAll()">Clear All Data</button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <div class="graph-wrap">
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Timestamp</th>
          <th style="color:var(--sleep)">Sleep</th>
          <th style="color:var(--dizziness)">Dizziness</th>
          <th style="color:var(--alertness)">Alertness</th>
          <th style="color:var(--sex)">Sex</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

<script>
  const TRACKER_TOKEN = "";
  const API = "/api/entries";

  const headers = {
    "Content-Type": "application/json",
    "x-tracker-token": TRACKER_TOKEN
  };

  // Populate dropdowns
  ["sleep","dizziness","alertness","sex"].forEach(id => {
    const sel = document.getElementById(id);
    for (let i = 1; i <= 10; i++) {
      const opt = document.createElement("option");
      opt.value = i;
      opt.textContent = i;
      sel.appendChild(opt);
    }
  });

  // Clock
  function updateClock() {
    const now = new Date();
    document.getElementById("clock").textContent = now.toLocaleString();
  }
  updateClock();
  setInterval(updateClock, 1000);

  // Format timestamp
  function formatTs(ts) {
    const d = new Date(ts);
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return `${months[d.getMonth()]} ${d.getDate()}, ${d.getHours()}:${String(d.getMinutes()).padStart(2,"0")}`;
  }

  let chart = null;

  function renderChart(entries) {
    const labels = entries.map(e => formatTs(e.timestamp));
    const minWidth = Math.max(600, entries.length * 40);
    const canvas = document.getElementById("chart");
    canvas.style.width = minWidth + "px";
    canvas.width = minWidth;
    canvas.height = 300;

    if (chart) chart.destroy();

    chart = new Chart(canvas, {
      type: "line",
      data: {
        labels,
        datasets: [
          { label: "Sleep", data: entries.map(e => e.sleep), borderColor: "#4fc3f7", backgroundColor: "transparent", tension: 0.3, pointRadius: 4 },
          { label: "Dizziness", data: entries.map(e => e.dizziness), borderColor: "#ef9a9a", backgroundColor: "transparent", tension: 0.3, pointRadius: 4 },
          { label: "Alertness", data: entries.map(e => e.alertness), borderColor: "#a5d6a7", backgroundColor: "transparent", tension: 0.3, pointRadius: 4 },
          { label: "Sex", data: entries.map(e => e.sex), borderColor: "#ce93d8", backgroundColor: "transparent", tension: 0.3, pointRadius: 4 },
        ]
      },
      options: {
        responsive: false,
        scales: {
          y: { min: 1, max: 10, ticks: { stepSize: 1, color: "#666" }, grid: { color: "#222" } },
          x: { ticks: { color: "#666", maxRotation: 45 }, grid: { color: "#222" } }
        },
        plugins: {
          legend: { labels: { color: "#e0e0e0", font: { family: "DM Sans" } } }
        }
      }
    });
  }

  function renderTable(entries) {
    const tbody = document.getElementById("table-body");
    const last10 = entries.slice(-10).reverse();
    tbody.innerHTML = last10.map(e => `
      <tr>
        <td>${formatTs(e.timestamp)}</td>
        <td style="color:var(--sleep)">${e.sleep}</td>
        <td style="color:var(--dizziness)">${e.dizziness}</td>
        <td style="color:var(--alertness)">${e.alertness}</td>
        <td style="color:var(--sex)">${e.sex}</td>
      </tr>
    `).join("");
  }

  async function loadData() {
    try {
      const res = await fetch(API, { headers });
      const entries = await res.json();
      renderChart(entries);
      renderTable(entries);
    } catch (err) {
      document.getElementById("status").textContent = "Error loading data: " + err.message;
    }
  }

  async function submitEntry() {
    const fields = ["sleep","dizziness","alertness","sex"];
    const body = {};
    for (const f of fields) {
      const val = document.getElementById(f).value;
      if (!val) {
        document.getElementById("status").textContent = "Please fill in all fields.";
        return;
      }
      body[f] = parseInt(val);
    }
    try {
      await fetch(API, { method: "POST", headers, body: JSON.stringify(body) });
      document.getElementById("status").textContent = "Saved!";
      setTimeout(() => document.getElementById("status").textContent = "", 2000);
      loadData();
    } catch (err) {
      document.getElementById("status").textContent = "Error: " + err.message;
    }
  }

  async function exportCsv() {
    const res = await fetch(API + "?export=csv", { headers });
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "tracker_export.csv";
    a.click();
    URL.revokeObjectURL(url);
  }

  async function clearAll() {
    if (!confirm("Delete all entries? This cannot be undone.")) return;
    await fetch(API, { method: "DELETE", headers });
    loadData();
  }

  loadData();
</script>
</body>
</html>
